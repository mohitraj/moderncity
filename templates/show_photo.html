{% extends "layout.html" %}

{% block content %}
  <style>
    /* Light blue theme */
    body {
      background-color: #e9f5ff;
    }
    h4 {
      color: #0056b3;
    }
    .photo-card {
      background-color: #ffffff;
      border: 1px solid #b3d9ff;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 4px 8px rgba(0,0,0,0.05);
    }
    .address-box {
      background: #d6ecff;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      margin-top: 1rem;
      font-size: 0.95rem;
      color: #004080;
    }
    .map-section { margin-top: 1.25rem; text-align: left; }
    .map-section h6 { color:#0056b3; font-weight:700; margin-bottom:.5rem; }
    .map-wrap {
      position: relative; width: 100%; padding-bottom: 56.25%; /* 16:9 */
      border-radius: 10px; overflow: hidden; border: 1px solid #b3d9ff;
      box-shadow: 0 2px 6px rgba(0,0,0,.06);
    }
    .map-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
  </style>

  <div class="row justify-content-center">
    <div class="col-12 col-md-10 col-lg-8">
      <div class="photo-card text-center">
        <h4 class="mb-3">Modern City</h4>

        <!-- Main large photo -->
        <a href="{{ image_url }}" data-toggle="modal" data-target="#photoModal" aria-label="Open image">
          <img src="{{ image_url }}"
               alt="{{ alt or 'Photo' }}"
               class="img-fluid rounded shadow-sm"
               style="max-height:150vh; width:150%; object-fit:contain;">
        </a>

        {% if caption %}
          <p class="mt-2 text-muted small">{{ caption }}</p>
        {% endif %}

        <!-- Address -->
        <div class="address-box">
          📍 Modern City, Eden City Rd, Kharar, Near Darpan City, Punjab 140301
        </div>

        <!-- Location map -->
        <div class="map-section">
          <div class="d-flex justify-content-between align-items-center flex-wrap">
            <h6 class="mb-2">📍 Location</h6>
            <a href="https://www.google.com/maps/search/?api=1&query={{ map_lat }},{{ map_lng }}"
               target="_blank" rel="noopener" class="btn btn-sm btn-outline-primary mb-2">
              Open in Google Maps
            </a>
          </div>
          <div class="map-wrap">
            <iframe
              src="https://www.google.com/maps?q={{ map_lat }},{{ map_lng }}&z=17&hl=en&output=embed"
              loading="lazy" referrerpolicy="no-referrer-when-downgrade"
              title="Modern City location"></iframe>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal for enlarged photo -->
  <div class="modal fade" id="photoModal" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-xl" role="document">
      <div class="modal-content bg-transparent border-0">
        <div class="modal-body p-0">
          <button type="button" class="close position-absolute p-2" style="right:8px;z-index:10;" data-dismiss="modal" aria-label="Close">
            <span aria-hidden="true" style="font-size:1.6rem;color:white;">&times;</span>
          </button>
          <img src="{{ image_url }}" alt="{{ alt or 'Photo' }}"
               class="img-fluid w-100 rounded"
               style="max-height:95vh; object-fit:contain;">
        </div>
      </div>
    </div>
  </div>
{% endblock %}
